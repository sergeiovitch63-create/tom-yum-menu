<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14140f">
<title>TOM YUM — Asian Food</title>
<style>
:root{
  --bg:#14140f; --bg2:#1a1a14; --card:#1c1c16; --card2:#24241b;
  --txt:#efebdf; --muted:#98927f; --line:#34332b;
  --gold:#e3b23c; --gold-d:#c1912a; --ink:#14140f;
  --spice:#e0713c; --veg:#8fae5e;
  --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
  --shadow:0 2px 4px rgba(0,0,0,.35),0 10px 28px rgba(0,0,0,.3);
}
[data-theme="light"]{
  --bg:#edebe4; --bg2:#f3f1ea; --card:#fbfaf6; --card2:#f0eee5;
  --txt:#1a1a13; --muted:#6f6a59; --line:#dcd7c8;
  --gold:#c9992c; --gold-d:#a97f1c; --ink:#14140f;
  --spice:#bd4f26; --veg:#4d7833;
  --shadow:0 1px 2px rgba(20,18,10,.06),0 8px 22px rgba(20,18,10,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background-color:var(--bg);
  background-image:
    repeating-linear-gradient(90deg, rgba(255,255,255,.017) 0 1px, transparent 1px 4px),
    repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 1px, transparent 1px 11px);
  color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background-color .25s ease,color .25s ease;
  padding-bottom:120px;
}
.wrap{max-width:520px;margin:0 auto;padding:0 16px}

/* ---------- barre haute ---------- */
.topbar{display:flex;justify-content:flex-end;gap:8px;padding:14px 0 0;position:relative;z-index:20}
.icobtn{
  min-width:46px;min-height:46px;border:1px solid var(--line);background:var(--card);
  color:var(--txt);border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;padding:0 12px;
  transition:transform .12s ease,border-color .2s ease;
}
.icobtn:active{transform:scale(.94)}
.icobtn:hover{border-color:var(--gold)}
.langbox{position:relative}
.caret{font-size:9px;color:var(--muted);transition:transform .2s ease}
.langbox.on .caret{transform:rotate(180deg)}
.langmenu{
  position:absolute;right:0;top:53px;min-width:174px;
  background:var(--card);border:1px solid var(--line);border-radius:6px;
  box-shadow:var(--shadow);overflow:hidden;z-index:30;display:none;
}
.langbox.on .langmenu{display:block;animation:drop .18s ease}
@keyframes drop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.langopt{
  display:flex;align-items:center;gap:11px;width:100%;min-height:48px;padding:0 13px;
  background:none;border:0;border-bottom:1px solid var(--line);
  color:var(--txt);font-size:14px;font-weight:600;cursor:pointer;text-align:left;
}
.langopt:last-child{border-bottom:0}
.langopt:active{background:var(--card2)}
.langopt[aria-selected="true"]{background:var(--card2);color:var(--gold);font-weight:800}
.flag{width:24px;height:16px;flex:0 0 24px;border-radius:2px;display:block;box-shadow:0 0 0 1px rgba(0,0,0,.3)}

/* ---------- en-tête ---------- */
header{text-align:center;padding:14px 0 20px}
.logo{
  display:block;width:154px;height:154px;margin:0 auto;border-radius:50%;
  box-shadow:0 0 0 1px rgba(227,178,60,.5), 0 10px 34px rgba(0,0,0,.55);
  animation:rise .5s cubic-bezier(.2,1.1,.4,1);
}
@keyframes rise{from{opacity:0;transform:translateY(-8px) scale(.94)}to{opacity:1;transform:none}}
.meta{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:8px;margin-top:16px}
.chip{
  background:var(--card);border:1px solid var(--line);border-radius:4px;
  padding:7px 11px;font-size:11.5px;font-weight:600;color:var(--muted);
  display:flex;align-items:center;gap:7px;letter-spacing:.04em;
}
.chip img{width:19px;height:19px;display:block}
.chip b{color:var(--txt);font-weight:700}

.social{display:flex;justify-content:center;gap:9px;margin-top:14px}
.soc{
  width:46px;height:46px;border-radius:6px;border:1px solid var(--line);background:var(--card);
  color:var(--txt);display:flex;align-items:center;justify-content:center;text-decoration:none;
  transition:transform .12s ease,border-color .2s ease,color .2s ease;
}
.soc:active{transform:scale(.9)}
.soc:hover{border-color:var(--gold);color:var(--gold)}
.soc svg{width:21px;height:21px;display:block}
.reviews{
  display:flex;align-items:center;justify-content:center;gap:9px;
  min-height:48px;margin-top:9px;border-radius:6px;
  background:transparent;border:1px solid var(--gold);color:var(--gold);
  font-size:11.5px;font-weight:700;text-decoration:none;
  text-transform:uppercase;letter-spacing:.1em;
  transition:transform .12s ease,background .2s ease;
}
.reviews:active{transform:scale(.97)}
.reviews:hover{background:rgba(227,178,60,.09)}
.reviews svg{width:16px;height:16px}

/* ---------- filtres ---------- */
.filters{display:flex;gap:7px;overflow-x:auto;padding:8px 0 16px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.pill{
  flex:0 0 auto;min-height:44px;padding:0 15px;border-radius:4px;border:1px solid var(--line);
  background:var(--card);color:var(--muted);font-size:11px;font-weight:800;cursor:pointer;
  white-space:nowrap;text-transform:uppercase;letter-spacing:.1em;transition:all .18s ease;
}
.pill[aria-pressed="true"]{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.pill:active{transform:scale(.95)}

/* ---------- catégories ---------- */
.cat{background:var(--card);border:1px solid var(--line);border-radius:5px;margin-bottom:9px;overflow:hidden}
.cat-btn{
  width:100%;min-height:62px;display:flex;align-items:center;gap:12px;
  background:var(--gold);border:0;color:var(--ink);padding:11px 14px;cursor:pointer;text-align:left;
  transition:background .18s ease;
}
.cat-btn:active{background:var(--gold-d)}
.cat-txt{flex:1;min-width:0}
.cat-title{font-family:var(--serif);font-size:17px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;line-height:1.15;display:block}
.cat-sub{display:block;font-size:11px;font-style:italic;color:rgba(20,20,15,.72);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-n{font-family:var(--serif);font-size:12px;font-weight:700;background:rgba(20,20,15,.88);color:var(--gold);border-radius:3px;padding:4px 9px}
.arrow{font-size:10px;color:rgba(20,20,15,.75);transition:transform .25s ease}
.cat[open] .arrow{transform:rotate(90deg)}
.panel{display:none;padding:0 14px 10px;background:var(--card)}
.cat[open] .panel{display:block;animation:slide .22s ease}
@keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

/* ---------- plats ---------- */
.grp{
  font-family:var(--serif);font-size:11.5px;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:var(--gold);padding:18px 0 6px;
}
.dish{padding:16px 0;border-bottom:1px solid var(--line)}
.dish:last-child{border-bottom:0}
.figure{position:relative;margin-bottom:13px;background:var(--card2)}
.figure::before,.figure::after{content:"";position:absolute;width:18px;height:18px;pointer-events:none}
.figure::before{left:0;top:0;border-left:2px solid var(--gold);border-top:2px solid var(--gold)}
.figure::after{right:0;bottom:0;border-right:2px solid var(--gold);border-bottom:2px solid var(--gold)}
.hero{display:block;width:100%;height:198px;object-fit:contain;padding:11px;animation:fade .3s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.dish-main{min-width:0}
.dish-name{font-size:14.5px;font-weight:700;line-height:1.3;letter-spacing:.01em}
.dish-desc{font-size:12.5px;color:var(--muted);margin-top:5px;line-height:1.5}
.note{
  font-size:11.5px;margin-top:8px;color:var(--txt);
  border-left:2px solid var(--gold);background:var(--card2);
  padding:7px 9px;line-height:1.45;
}
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.b{font-size:9.5px;font-weight:800;padding:3px 6px;border-radius:2px;letter-spacing:.09em;text-transform:uppercase}
.b.spi{background:color-mix(in srgb,var(--spice) 16%,transparent);color:var(--spice)}
.b.veg{background:color-mix(in srgb,var(--veg) 16%,transparent);color:var(--veg)}
.foot{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-top:11px}
.price{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--gold);white-space:nowrap}
.vgrid{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.v{font-size:11px;font-weight:600;background:var(--card2);border:1px solid var(--line);border-radius:3px;padding:5px 8px;white-space:nowrap;color:var(--muted)}
.v b{font-family:var(--serif);color:var(--gold);font-weight:700}
.add{
  width:44px;height:44px;flex:0 0 44px;border-radius:5px;border:0;
  background:var(--gold);color:var(--ink);font-size:22px;font-weight:500;line-height:1;
  cursor:pointer;transition:transform .12s ease;
}
.add:active{transform:scale(.85)}
.add.in{background:var(--veg);color:#fff;font-weight:800;font-size:15px}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:13px;line-height:1.7;font-style:italic}

/* ---------- panier ---------- */
.fab{
  position:fixed;left:50%;transform:translateX(-50%) translateY(140%);
  bottom:calc(16px + env(safe-area-inset-bottom));
  width:calc(100% - 32px);max-width:488px;height:56px;border:0;border-radius:6px;
  background:var(--gold);color:var(--ink);display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;font-size:11.5px;font-weight:800;cursor:pointer;z-index:40;
  text-transform:uppercase;letter-spacing:.1em;
  box-shadow:0 10px 30px rgba(0,0,0,.45);transition:transform .3s cubic-bezier(.2,1.2,.4,1);
}
.fab.on{transform:translateX(-50%) translateY(0)}
.fab-n{background:rgba(20,20,15,.85);color:var(--gold);border-radius:3px;padding:4px 9px;font-size:12px}
.fab-tot{font-family:var(--serif);font-size:16px;letter-spacing:0;text-transform:none}

.scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--bg2);
  border-top:2px solid var(--gold);
  transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.3,1);
  max-height:86vh;display:flex;flex-direction:column;
}
.sheet.on{transform:none}
.sheet-in{max-width:520px;margin:0 auto;width:100%;display:flex;flex-direction:column;min-height:0}
.grab{width:38px;height:3px;background:var(--line);border-radius:2px;margin:10px auto 0;flex:0 0 auto}
.sheet-h{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;flex:0 0 auto}
.sheet-h h2{margin:0;font-family:var(--serif);font-size:17px;font-weight:700;letter-spacing:.09em;text-transform:uppercase}
.sheet-body{overflow-y:auto;padding:0 18px;-webkit-overflow-scrolling:touch}
.ci{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.ci-n{flex:1;min-width:0}
.ci-n div:first-child{font-size:13.5px;font-weight:700}
.ci-n div:last-child{font-size:11.5px;color:var(--muted);margin-top:3px;font-style:italic}
.qty{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:5px}
.qty button{width:44px;height:44px;border:0;background:none;color:var(--txt);font-size:17px;cursor:pointer}
.qty button:active{background:var(--card2)}
.qty span{min-width:24px;text-align:center;font-size:14px;font-weight:800}
.ci-p{font-family:var(--serif);font-size:14px;font-weight:700;min-width:62px;text-align:right;color:var(--gold)}
.tot{padding:14px 0;border-top:1px solid var(--line);flex:0 0 auto}
.tr{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:5px 0}
.tr.big{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--txt);padding-top:10px}
.tr.big span:last-child{color:var(--gold)}
.order{
  width:100%;height:54px;border:0;border-radius:5px;background:var(--gold);color:var(--ink);
  font-size:11.5px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:.11em;
  margin:4px 0 calc(18px + env(safe-area-inset-bottom));
}
.order:active{transform:scale(.98)}
.order:disabled{opacity:.35}
footer{text-align:center;color:var(--muted);font-size:11px;padding:30px 0 10px;line-height:1.9;letter-spacing:.06em}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="langbox" id="langbox">
      <button class="icobtn" id="langbtn" aria-haspopup="listbox" aria-expanded="false">
        <span id="langFlag"></span><span id="langTxt"></span><span class="caret">▼</span>
      </button>
      <div class="langmenu" id="langmenu" role="listbox"></div>
    </div>
    <button class="icobtn" id="theme" aria-label="Tema"></button>
  </div>

  <header>
    <img class="logo" src="img/logo.webp" width="320" height="320"
         alt="TOM YUM — Asian Food" fetchpriority="high" decoding="async">
    <div class="meta">
      <span class="chip"><img src="img/halal.webp" alt="Halal" width="20" height="20"> <b>Halal</b></span>
      <span class="chip" id="dishCount"></span>
    </div>
    <div class="social" id="social"></div>
    <a class="reviews" id="reviews" target="_blank" rel="noopener noreferrer"></a>
  </header>

  <div class="filters" id="filters"></div>
  <div id="list"></div>

  <footer id="foot"></footer>
</div>

<button class="fab" id="fab">
  <span class="fab-n" id="fabN">0</span>
  <span id="fabTxt"></span>
  <span class="fab-tot" id="fabTot">0</span>
</button>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="sheet-in">
    <div class="grab"></div>
    <div class="sheet-h">
      <h2 id="sheetTitle"></h2>
      <button class="icobtn" id="close" aria-label="close">✕</button>
    </div>
    <div class="sheet-body" id="cartBody"></div>
    <div style="padding:0 18px">
      <div class="tot" id="totals"></div>
      <button class="order" id="order"></button>
    </div>
  </div>
</div>

<script>

  {n:g("Heineken botella","Heineken bottle","Heineken bouteille"),p:2.80},
  {n:g("Heineken lata","Heineken can","Heineken canette"),p:1.95},
  {n:g("Heineken 0,0","Heineken 0.0","Heineken 0,0"),p:2.80},
  {n:g("Coronita","Coronita","Coronita"),p:3.00},
  {n:g("Coronita 0,0","Coronita 0.0","Coronita 0,0"),p:3.00},
  {n:g("Águila sin filtrar","Águila unfiltered","Águila non filtrée"),p:2.90},
  {n:g("Cruz Campo sin gluten","Cruz Campo gluten-free","Cruz Campo sans gluten"),p:2.95},
  {n:g("Peroni","Peroni","Peroni"),p:3.00},
  {n:g("Radler","Radler","Radler"),p:2.90},
  {n:g("Erdinger","Erdinger","Erdinger"),p:4.10},
  {n:g("Estrella 0,0","Estrella 0.0","Estrella 0,0"),p:2.35},
  {n:g("Estrella 0,0 tostada","Estrella 0.0 amber","Estrella 0,0 ambrée"),p:2.35},
  {n:g("Asahi","Asahi","Asahi"),p:3.10},
  {n:g("Singha","Singha","Singha"),p:3.20},
  {n:g("Kirin","Kirin","Kirin"),p:3.20}
 ]}
];

/* ============================================================
   Estado
   ============================================================ */
const LANGS = ["es","en","fr"];
let lang  = localStorage.getItem("ty_lang")  || "es";
let theme = localStorage.getItem("ty_theme") || "dark";
let filter = "all";
const cart = new Map();
const open = new Set();

const $ = s => document.querySelector(s);
const T = () => UI[lang];

const money = n =>
  lang === "en"
    ? "€" + n.toFixed(2)
    : n.toFixed(2).replace(".", ",") + " €";

/* ============================================================
   Render
   ============================================================ */
function matches(d){
  if (filter === "veg"   && !(d.tags||[]).includes("veg"))   return false;
  if (filter === "spicy" && !(d.tags||[]).includes("spicy")) return false;
  if (filter === "photo" && !d.img) return false;
  return true;
}

function renderFilters(){
  const f = T().filters;
  $("#filters").innerHTML = [["all",f.all],["veg",f.veg],["spicy",f.spicy],["photo",f.photo]]
    .map(([k,l]) => `<button class="pill" data-f="${k}" aria-pressed="${filter===k}">${l}</button>`)
    .join("");
}

function dishHTML(c, d, i){
  const key = c.id + ":" + i;
  const n = cart.get(key) || 0;
  const badges = (d.tags||[]).map(t =>
    t === "veg"   ? `<span class="b veg">${T().badges.veg}</span>` :
    t === "spicy" ? `<span class="b spi">${T().badges.spicy}</span>` : "").join("");

  const foot = d.p != null
    ? `<span class="price">${money(d.p)}</span>
       <button class="add ${n?"in":""}" data-add="${key}" aria-label="+">${n||"+"}</button>`
    : `<div class="vgrid">${d.v.map(([l,p]) => `<span class="v">${l[lang]} <b>${money(p)}</b></span>`).join("")}</div>`;

  return `${d.grp ? `<div class="grp">${d.grp[lang]}</div>` : ""}
  <div class="dish">
    ${d.img ? `<div class="figure"><img class="hero" src="img/${d.img}.webp" alt="${d.n[lang]}" width="460" height="198" loading="lazy" decoding="async"></div>` : ""}
    <div class="dish-main">
      <div class="dish-name">${d.n[lang]}</div>
      ${d.d ? `<div class="dish-desc">${d.d[lang]}</div>` : ""}
      ${d.note ? `<div class="note">${d.note[lang]}</div>` : ""}
      ${badges ? `<div class="badges">${badges}</div>` : ""}
      <div class="foot">${foot}</div>
    </div>
  </div>`;
}

function renderList(){
  let html = "", shown = 0;
  for (const c of MENU){
    const hits = c.items.map((d,i) => [d,i]).filter(([d]) => matches(d));
    if (!hits.length) continue;
    shown += hits.length;
    const isOpen = open.has(c.id) || filter !== "all";
    html += `<div class="cat" ${isOpen?"open":""}>
      <button class="cat-btn" data-toggle="${c.id}">
        <span class="cat-txt">
          <span class="cat-title">${c.n[lang]}</span>
          <span class="cat-sub">${c.s[lang]}</span>
        </span>
        <span class="cat-n">${hits.length}</span>
        <span class="arrow">▶</span>
      </button>
      <div class="panel">${hits.map(([d,i]) => dishHTML(c,d,i)).join("")}</div>
    </div>`;
  }
  $("#list").innerHTML = shown ? html : `<div class="empty">${T().noRes}</div>`;
}

function find(key){
  const [cid,i] = key.split(":");
  const c = MENU.find(x => x.id === cid);
  return { c, d: c.items[+i] };
}

function totals(){
  let n = 0, sum = 0;
  for (const [k,q] of cart){ n += q; sum += find(k).d.p * q; }
  return { n, sum };
}

function renderCart(){
  const { n, sum } = totals();
  $("#fab").classList.toggle("on", n > 0);
  $("#fabN").textContent = n;
  $("#fabTxt").textContent = T().view;
  $("#fabTot").textContent = money(sum);

  const body = $("#cartBody");
  if (!n){
    body.innerHTML = `<div class="empty">${T().empty}</div>`;
    $("#totals").innerHTML = "";
    $("#order").disabled = true;
  } else {
    body.innerHTML = [...cart].map(([k,q]) => {
      const { c,d } = find(k);
      return `<div class="ci">
        <div class="ci-n"><div>${d.n[lang]}</div><div>${c.n[lang]} · ${money(d.p)}</div></div>
        <div class="qty">
          <button data-q="${k}:-1" aria-label="−">−</button><span>${q}</span><button data-q="${k}:1" aria-label="+">+</button>
        </div>
        <div class="ci-p">${money(d.p*q)}</div>
      </div>`;
    }).join("");
    $("#totals").innerHTML = `<div class="tr big"><span>${T().total}</span><span>${money(sum)}</span></div>`;
    $("#order").disabled = false;
  }
  $("#order").textContent = T().order;
  $("#sheetTitle").textContent = T().cart;
}

function renderSocial(){
  const order = ["instagram","facebook","maps","tripadvisor"];
  $("#social").innerHTML = order
    .filter(k => LINKS[k])
    .map(k => `<a class="soc" href="${LINKS[k]}" target="_blank" rel="noopener noreferrer"
                  aria-label="${T().soc[k]}" title="${T().soc[k]}">${ICONS[k]}</a>`)
    .join("");
  const rev = $("#reviews");
  if (LINKS.reviews){
    rev.href = LINKS.reviews;
    rev.innerHTML = `${ICONS.star}<span>${T().reviews}</span>`;
    rev.style.display = "";
  } else rev.style.display = "none";
}

function renderLang(){
  $("#langFlag").innerHTML = FLAGS[lang];
  $("#langTxt").textContent = lang.toUpperCase();
  $("#langmenu").innerHTML = LANGS.map(k =>
    `<button class="langopt" role="option" data-lang="${k}" aria-selected="${k===lang}">
       ${FLAGS[k]}<span>${LANG_NAME[k]}</span>
     </button>`).join("");
}

function renderStatic(){
  document.documentElement.lang = lang;
  renderLang();
  renderSocial();
  $("#foot").innerHTML = T().foot;
  const total = MENU.reduce((a,c) => a + c.items.length, 0);
  $("#dishCount").innerHTML = `<b>${total}</b> ${T().count}`;
}

function renderAll(){ renderStatic(); renderFilters(); renderList(); renderCart(); }

/* ============================================================
   Eventos
   ============================================================ */
$("#list").addEventListener("click", e => {
  const tog = e.target.closest("[data-toggle]");
  if (tog){
    const id = tog.dataset.toggle, el = tog.closest(".cat");
    if (el.hasAttribute("open")){ el.removeAttribute("open"); open.delete(id); }
    else { el.setAttribute("open",""); open.add(id); }
    return;
  }
  const add = e.target.closest("[data-add]");
  if (add){
    const k = add.dataset.add;
    cart.set(k,(cart.get(k)||0)+1);
    add.textContent = cart.get(k);
    add.classList.add("in");
    renderCart();
  }
});

$("#cartBody").addEventListener("click", e => {
  const b = e.target.closest("[data-q]");
  if (!b) return;
  const parts = b.dataset.q.split(":");
  const delta = +parts.pop();
  const k = parts.join(":");
  const q = (cart.get(k)||0) + delta;
  if (q <= 0) cart.delete(k); else cart.set(k,q);
  renderCart(); renderList();
});

$("#filters").addEventListener("click", e => {
  const p = e.target.closest("[data-f]");
  if (!p) return;
  filter = p.dataset.f;
  renderFilters(); renderList();
});

/* --- sélecteur de langue dépliant --- */
const setLangOpen = v => {
  $("#langbox").classList.toggle("on", v);
  $("#langbtn").setAttribute("aria-expanded", v);
};
$("#langbtn").addEventListener("click", e => {
  e.stopPropagation();
  setLangOpen(!$("#langbox").classList.contains("on"));
});
$("#langmenu").addEventListener("click", e => {
  const o = e.target.closest("[data-lang]");
  if (!o) return;
  lang = o.dataset.lang;
  localStorage.setItem("ty_lang", lang);
  setLangOpen(false);
  renderAll();
});
document.addEventListener("click", e => {
  if (!e.target.closest("#langbox")) setLangOpen(false);
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") setLangOpen(false);
});

const SUN =`<svg viewBox="0 0 24 24" width="19" height="19" aria-hidden="true"><circle cx="12" cy="12" r="4.6" fill="currentColor"/><g stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 2.4v2.6M12 19v2.6M2.4 12H5M19 12h2.6M5.2 5.2l1.8 1.8M17 17l1.8 1.8M18.8 5.2L17 7M7 17l-1.8 1.8"/></g></svg>`;
const MOON=`<svg viewBox="0 0 24 24" width="19" height="19" aria-hidden="true"><path fill="currentColor" d="M20.5 14.4A8.6 8.6 0 0 1 9.6 3.5a8.6 8.6 0 1 0 10.9 10.9z"/></svg>`;

function applyTheme(){
  document.documentElement.dataset.theme = theme;
  $("#theme").innerHTML = theme === "dark" ? SUN : MOON;
  document.querySelector('meta[name="theme-color"]')
    .setAttribute("content", theme === "dark" ? "#14140f" : "#edebe4");
}
$("#theme").addEventListener("click", () => {
  theme = theme === "dark" ? "light" : "dark";
  localStorage.setItem("ty_theme", theme);
  applyTheme();
});

const openSheet = v => {
  $("#sheet").classList.toggle("on", v);
  $("#scrim").classList.toggle("on", v);
  document.body.style.overflow = v ? "hidden" : "";
};
$("#fab").addEventListener("click", () => openSheet(true));
$("#close").addEventListener("click", () => openSheet(false));
$("#scrim").addEventListener("click", () => openSheet(false));
$("#order").addEventListener("click", () => {
  alert(T().done);
  openSheet(false);
});

applyTheme();
renderAll();
</script>
</body>
</html>
