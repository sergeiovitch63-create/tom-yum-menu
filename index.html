<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f12">
<title>SAKURA — Menu</title>
<style>
:root{
  --bg:#f5f2ef; --card:#ffffff; --card2:#faf7f4; --txt:#16151a; --muted:#7a7480;
  --line:#e6e0da; --accent:#e0526b; --accent2:#ffd9e0; --shadow:0 1px 2px rgba(20,15,25,.06),0 6px 18px rgba(20,15,25,.05);
  --ok:#2e9e6b; --spice:#e2603a; --new:#4a7fe0;
}
[data-theme="dark"]{
  --bg:#0f0f12; --card:#1a1a20; --card2:#212129; --txt:#f2eff2; --muted:#8f8a97;
  --line:#2c2c36; --accent:#ff6c86; --accent2:#3a1f28; --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.3);
  --ok:#4dc98d; --spice:#ff8a5c; --new:#7aa5ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .25s ease,color .25s ease;
  padding-bottom:120px;
}
.wrap{max-width:520px;margin:0 auto;padding:0 16px}

/* ---------- Top bar ---------- */
.topbar{display:flex;justify-content:flex-end;gap:8px;padding:12px 0 0}
.icobtn{
  min-width:44px;min-height:44px;border:1px solid var(--line);background:var(--card);
  color:var(--txt);border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;padding:0 12px;
  transition:transform .12s ease,background .2s ease;
}
.icobtn:active{transform:scale(.94)}

/* ---------- Header ---------- */
header{text-align:center;padding:14px 0 20px}
.logo{
  width:78px;height:78px;margin:0 auto 12px;border-radius:26px;
  background:linear-gradient(145deg,var(--accent),#ff9db0);
  display:flex;align-items:center;justify-content:center;font-size:40px;
  box-shadow:var(--shadow);animation:pop .5s cubic-bezier(.2,1.4,.4,1);
}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
h1{margin:0;font-size:30px;letter-spacing:.22em;font-weight:800;text-indent:.22em}
.sub{margin:6px 0 0;color:var(--muted);font-size:14px}
.meta{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:14px}
.chip{
  background:var(--card);border:1px solid var(--line);border-radius:999px;
  padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--muted);
}
.chip b{color:var(--txt)}

/* ---------- Search ---------- */
.search{position:relative;margin:4px 0 12px}
.search input{
  width:100%;height:50px;border-radius:16px;border:1px solid var(--line);
  background:var(--card);color:var(--txt);padding:0 44px 0 44px;font-size:16px;outline:none;
  transition:border-color .2s ease;
}
.search input:focus{border-color:var(--accent)}
.search .ic{position:absolute;left:15px;top:14px;font-size:17px;opacity:.55}
.search .clr{
  position:absolute;right:5px;top:3px;width:44px;height:44px;border:0;background:none;
  color:var(--muted);font-size:20px;cursor:pointer;display:none;
}
.search.has .clr{display:block}

/* ---------- Filters ---------- */
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 14px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.pill{
  flex:0 0 auto;min-height:44px;padding:0 16px;border-radius:999px;border:1px solid var(--line);
  background:var(--card);color:var(--txt);font-size:14px;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all .18s ease;
}
.pill[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
.pill:active{transform:scale(.95)}

/* ---------- Category links ---------- */
.cat{
  background:var(--card);border:1px solid var(--line);border-radius:18px;
  margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;
}
.cat-btn{
  width:100%;min-height:68px;display:flex;align-items:center;gap:14px;
  background:none;border:0;color:var(--txt);padding:12px 14px;cursor:pointer;text-align:left;
}
.cat-btn:active{background:var(--card2)}
.cat-emo{
  width:46px;height:46px;flex:0 0 46px;border-radius:14px;background:var(--card2);
  display:flex;align-items:center;justify-content:center;font-size:24px;
}
.cat-txt{flex:1;min-width:0}
.cat-title{font-size:16px;font-weight:700;line-height:1.25}
.cat-sub{font-size:12.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-n{
  font-size:12px;font-weight:700;color:var(--muted);background:var(--card2);
  border-radius:999px;padding:4px 9px;
}
.arrow{font-size:12px;color:var(--muted);transition:transform .25s ease}
.cat[open] .arrow{transform:rotate(90deg)}

.panel{display:none;padding:0 14px 8px;border-top:1px solid var(--line)}
.cat[open] .panel{display:block;animation:slide .22s ease}
@keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

/* ---------- Dish ---------- */
.dish{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.dish:last-child{border-bottom:0}
.dish-main{flex:1;min-width:0}
.dish-name{font-size:15px;font-weight:700;line-height:1.3}
.dish-desc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.45}
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.b{font-size:10.5px;font-weight:800;padding:3px 7px;border-radius:6px;letter-spacing:.03em;text-transform:uppercase}
.b.pop{background:var(--accent2);color:var(--accent)}
.b.new{background:color-mix(in srgb,var(--new) 16%,transparent);color:var(--new)}
.b.veg{background:color-mix(in srgb,var(--ok) 16%,transparent);color:var(--ok)}
.b.spi{background:color-mix(in srgb,var(--spice) 16%,transparent);color:var(--spice)}
.b.gf{background:color-mix(in srgb,var(--muted) 16%,transparent);color:var(--muted)}
.aller{font-size:11.5px;color:var(--muted);margin-top:7px;opacity:.85}
.dish-side{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:8px}
.price{font-size:15px;font-weight:800;white-space:nowrap}
.add{
  width:44px;height:44px;border-radius:14px;border:0;background:var(--accent);color:#fff;
  font-size:22px;font-weight:400;line-height:1;cursor:pointer;transition:transform .12s ease;
}
.add:active{transform:scale(.85)}
.add.in{background:var(--ok)}

.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}

/* ---------- Cart FAB ---------- */
.fab{
  position:fixed;left:50%;transform:translateX(-50%) translateY(140%);
  bottom:calc(16px + env(safe-area-inset-bottom));
  width:calc(100% - 32px);max-width:488px;height:58px;border:0;border-radius:18px;
  background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;font-size:15px;font-weight:700;cursor:pointer;z-index:40;
  box-shadow:0 8px 30px rgba(224,82,107,.4);transition:transform .3s cubic-bezier(.2,1.2,.4,1);
}
.fab.on{transform:translateX(-50%) translateY(0)}
.fab-n{background:rgba(255,255,255,.25);border-radius:9px;padding:3px 9px;font-size:13px}

/* ---------- Sheet ---------- */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--bg);
  border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.3,1);
  max-height:86vh;display:flex;flex-direction:column;
}
.sheet.on{transform:none}
.sheet-in{max-width:520px;margin:0 auto;width:100%;display:flex;flex-direction:column;min-height:0}
.grab{width:40px;height:4px;background:var(--line);border-radius:9px;margin:10px auto 0;flex:0 0 auto}
.sheet-h{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;flex:0 0 auto}
.sheet-h h2{margin:0;font-size:19px}
.sheet-body{overflow-y:auto;padding:0 18px;-webkit-overflow-scrolling:touch}
.ci{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.ci-n{flex:1;min-width:0}
.ci-n div:first-child{font-size:14px;font-weight:700}
.ci-n div:last-child{font-size:12.5px;color:var(--muted);margin-top:2px}
.qty{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:12px}
.qty button{width:38px;height:40px;border:0;background:none;color:var(--txt);font-size:18px;cursor:pointer}
.qty button:active{background:var(--card2)}
.qty span{min-width:26px;text-align:center;font-size:14px;font-weight:800}
.ci-p{font-size:14px;font-weight:800;min-width:62px;text-align:right}
.tot{padding:14px 0;border-top:1px solid var(--line);flex:0 0 auto}
.tr{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);padding:5px 0}
.tr.big{font-size:18px;font-weight:800;color:var(--txt);padding-top:10px;margin-top:6px;border-top:1px dashed var(--line)}
.order{
  width:100%;height:56px;border:0;border-radius:16px;background:var(--accent);color:#fff;
  font-size:16px;font-weight:700;cursor:pointer;margin:4px 0 calc(18px + env(safe-area-inset-bottom));
}
.order:active{transform:scale(.98)}
.order:disabled{opacity:.4}
footer{text-align:center;color:var(--muted);font-size:12px;padding:26px 0 10px}
</style>
</head>

/* ============================================================
   State
   ============================================================ */
const SHIP = 3.5;
let lang = localStorage.getItem("sakura_lang") || "fr";
let theme = localStorage.getItem("sakura_theme") || "light";
let filter = "all";
let query = "";
const cart = new Map();               // key "catId:index" -> qty
const open = new Set();

const $ = s => document.querySelector(s);
const T = () => UI[lang];

const money = n =>
  lang === "fr"
    ? n.toFixed(2).replace(".", ",") + " €"
    : "€" + n.toFixed(2);

/* ============================================================
   Render
   ============================================================ */
function matches(d){
  if (filter === "pop" && d.badge !== "pop") return false;
  if (filter !== "all" && filter !== "pop" && !d.tags.includes(filter)) return false;
  if (!query) return true;
  const q = query.toLowerCase();
  return (d[lang] + " " + d["d" + lang]).toLowerCase().includes(q);
}

function badgeList(d){
  const out = [];
  if (d.badge === "pop") out.push(["pop", T().badges.pop]);
  if (d.badge === "new") out.push(["new", T().badges.new]);
  if (d.tags.includes("veg")) out.push(["veg", T().badges.veg]);
  if (d.tags.includes("spicy")) out.push(["spi", T().badges.spicy]);
  if (d.tags.includes("gf")) out.push(["gf", T().badges.gf]);
  return out;
}

function renderFilters(){
  const f = T().filters;
  $("#filters").innerHTML = [
    ["all", f.all], ["pop", f.pop], ["veg", f.veg], ["spicy", f.spicy], ["gf", f.gf]
  ].map(([k, l]) =>
    `<button class="pill" data-f="${k}" aria-pressed="${filter === k}">${l}</button>`
  ).join("");
}

function renderList(){
  const list = $("#list");
  let html = "", shown = 0;

  for (const c of MENU){
    const hits = c.items.map((d, i) => [d, i]).filter(([d]) => matches(d));
    if (!hits.length) continue;
    shown += hits.length;
    const isOpen = open.has(c.id) || !!query || filter !== "all";

    html += `<div class="cat" ${isOpen ? "open" : ""} data-c="${c.id}">
      <button class="cat-btn" data-toggle="${c.id}">
        <span class="cat-emo">${c.emo}</span>
        <span class="cat-txt">
          <span class="cat-title">${c[lang]}</span>
          <span class="cat-sub">${c[lang + "s"]}</span>
        </span>
        <span class="cat-n">${hits.length}</span>
        <span class="arrow">▶</span>
      </button>
      <div class="panel">${hits.map(([d, i]) => dishHTML(c, d, i)).join("")}</div>
    </div>`;
  }

  list.innerHTML = shown ? html : `<div class="empty">🍥<br><br>${T().noRes}</div>`;
}

function dishHTML(c, d, i){
  const key = c.id + ":" + i;
  const n = cart.get(key) || 0;
  const al = d["a" + lang];
  return `<div class="dish">
    <div class="dish-main">
      <div class="dish-name">${d[lang]}</div>
      <div class="dish-desc">${d["d" + lang]}</div>
      <div class="badges">${badgeList(d).map(([k, l]) => `<span class="b ${k}">${l}</span>`).join("")}</div>
      <div class="aller">${T().aller} : ${al || T().none}</div>
    </div>
    <div class="dish-side">
      <span class="price">${money(d.p)}</span>
      <button class="add ${n ? "in" : ""}" data-add="${key}" aria-label="+">${n ? n : "+"}</button>
    </div>
  </div>`;
}

function find(key){
  const [cid, i] = key.split(":");
  const c = MENU.find(x => x.id === cid);
  return { c, d: c.items[+i] };
}

function totals(){
  let n = 0, sum = 0;
  for (const [k, q] of cart){ n += q; sum += find(k).d.p * q; }
  return { n, sum };
}

function renderCart(){
  const { n, sum } = totals();
  const fab = $("#fab");
  fab.classList.toggle("on", n > 0);
  $("#fabN").textContent = n;
  $("#fabTxt").textContent = T().view;
  $("#fabTot").textContent = money(sum);

  const body = $("#cartBody");
  if (!n){
    body.innerHTML = `<div class="empty">🛒<br><br>${T().empty}</div>`;
    $("#totals").innerHTML = "";
    $("#order").disabled = true;
  } else {
    body.innerHTML = [...cart].map(([k, q]) => {
      const { c, d } = find(k);
      return `<div class="ci">
        <div class="ci-n"><div>${d[lang]}</div><div>${c.emo} ${money(d.p)}</div></div>
        <div class="qty">
          <button data-q="${k}:-1" aria-label="−">−</button>
          <span>${q}</span>
          <button data-q="${k}:1" aria-label="+">+</button>
        </div>
        <div class="ci-p">${money(d.p * q)}</div>
      </div>`;
    }).join("");
    $("#totals").innerHTML =
      `<div class="tr"><span>${T().sub}</span><span>${money(sum)}</span></div>
       <div class="tr"><span>${T().ship}</span><span>${money(SHIP)}</span></div>
       <div class="tr big"><span>${T().total}</span><span>${money(sum + SHIP)}</span></div>`;
    $("#order").disabled = false;
  }
  $("#order").textContent = T().order;
  $("#sheetTitle").textContent = T().cart;
}

function renderStatic(){
  const t = T();
  document.documentElement.lang = lang;
  $("#langTxt").textContent = lang === "fr" ? "EN" : "FR";
  $("#tagline").textContent = t.tagline;
  $("#revTxt").textContent = t.rev;
  $("#hoursTxt").textContent = t.hours;
  $("#q").placeholder = t.search;
}

function renderAll(){ renderStatic(); renderFilters(); renderList(); renderCart(); }

/* ============================================================
   Events
   ============================================================ */
$("#list").addEventListener("click", e => {
  const tog = e.target.closest("[data-toggle]");
  if (tog){
    const id = tog.dataset.toggle;
    const el = tog.closest(".cat");
    if (el.hasAttribute("open")){ el.removeAttribute("open"); open.delete(id); }
    else { el.setAttribute("open", ""); open.add(id); }
    return;
  }
  const add = e.target.closest("[data-add]");
  if (add){
    const k = add.dataset.add;
    cart.set(k, (cart.get(k) || 0) + 1);
    add.textContent = cart.get(k);
    add.classList.add("in");
    renderCart();
  }
});

$("#cartBody").addEventListener("click", e => {
  const b = e.target.closest("[data-q]");
  if (!b) return;
  const parts = b.dataset.q.split(":");
  const delta = +parts.pop();
  const k = parts.join(":");
  const q = (cart.get(k) || 0) + delta;
  if (q <= 0) cart.delete(k); else cart.set(k, q);
  renderCart();
  renderList();
});

$("#filters").addEventListener("click", e => {
  const p = e.target.closest("[data-f]");
  if (!p) return;
  filter = p.dataset.f;
  renderFilters();
  renderList();
});

$("#q").addEventListener("input", e => {
  query = e.target.value.trim();
  $("#searchBox").classList.toggle("has", !!query);
  renderList();
});
$("#clr").addEventListener("click", () => {
  query = ""; $("#q").value = "";
  $("#searchBox").classList.remove("has");
  renderList();
});

$("#lang").addEventListener("click", () => {
  lang = lang === "fr" ? "en" : "fr";
  localStorage.setItem("sakura_lang", lang);
  renderAll();
});

function applyTheme(){
  document.documentElement.dataset.theme = theme;
  $("#theme").textContent = theme === "dark" ? "☀️" : "🌙";
  document.querySelector('meta[name="theme-color"]')
    .setAttribute("content", theme === "dark" ? "#0f0f12" : "#f5f2ef");
}
$("#theme").addEventListener("click", () => {
  theme = theme === "dark" ? "light" : "dark";
  localStorage.setItem("sakura_theme", theme);
  applyTheme();
});

const openSheet = v => {
  $("#sheet").classList.toggle("on", v);
  $("#scrim").classList.toggle("on", v);
  document.body.style.overflow = v ? "hidden" : "";
};
$("#fab").addEventListener("click", () => openSheet(true));
$("#close").addEventListener("click", () => openSheet(false));
$("#scrim").addEventListener("click", () => openSheet(false));
$("#order").addEventListener("click", () => {
  alert(T().done);
  cart.clear();
  openSheet(false);
  renderCart();
  renderList();
});

applyTheme();
renderAll();
</script>
